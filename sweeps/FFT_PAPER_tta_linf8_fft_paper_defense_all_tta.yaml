program: unsupervise_adapt.py
project: your_wandb_project
name: FFT_PAPER_linf8_fft_PAPER_defense_all_tta
method: grid
metric:
  name: acc_mean
  goal: maximize

parameters:
  adapt_alg:
    values: ["ERM", "Tent", "PL", "TSD", "T3A", "TeSLA"]
  dataset:
    values: ["PACS", "VLCS", "office-home"]
  test_envs:
    values: [0, 1, 2, 3]
  attack:
    value: linf_eps-8.0_steps-20
  attack_rate:
    values: [0, 50, 100]
  fft_input_alpha:
    value: 0.7
  fft_input_keep_ratio:
    value: 0.6
  fft_feat_alpha:
    value: 1.0
  fft_feat_keep_ratio:
    value: 0.8
  seeds:
    value: "0,1,2"

  batch_size:
    value: 64
