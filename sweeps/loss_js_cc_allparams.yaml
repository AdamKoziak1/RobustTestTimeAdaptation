program: unsupervised_adapt_dataset.py
project: safer
name: loss_js_cc_allparams
method: grid
metric:
  name: acc_0
  goal: maximize

parameters:
  attack:
    value: linf_eps-8.0_steps-20
  attack_rate:
    value: 100

  adapt_alg:
    value: "SAFER"

  steps:
    value: 1

  # Augmentation pipeline sweep
  s_wrap_alg:
    value: 0
  s_aug_prob:
    value: 1.0
  s_aug_seed:
    value: 123
  s_aug_require_freq_blur:
    value: 1
    #values: [0, 1]
  s_input_is_normalized:
    value: -1

  # Keep losses at SAFER defaults while varying augmentation
  s_js_weight:
    values: [0.0, 0.1, 1.0, 10]
  s_js_mode:
    value: "pooled"
  s_js_view_pool:
    value: "matching"

  s_cc_weight:
    values: [0.0, 0.0005, 0.001, 0.005]
  s_cc_mode:
    value: "pairwise"
  s_cc_view_pool:
    value: "matching"
  s_cc_impl:
    value: "fast"

  s_tta_loss:
    value: "tent"
  s_tta_weight:
    value: 1
  s_tta_target:
    value: "pooled"
  s_tta_view_pool:
    value: "matching"

  s_primary_view_pool:
    values: ["mean", "cc_drop", "entropy", "cc"]
  s_view_weighting:
    value: 1
