program: unsupervised_adapt_dataset.py
project: safer
name: safer_alpha_disagreement_dataset
method: grid
metric:
  name: acc_0
  goal: maximize

parameters:
  attack:
    value: linf_eps-8.0_steps-20
  attack_rate:
    value: 100

  adapt_alg:
    value: "SAFER"

  update_param:
    value: "tent"

  lr:
    value: 0.0001

  steps:
    value: 1

  s_wrap_alg:
    value: 0
  s_num_views:
    value: 4
  s_aug_prob:
    value: 1.0
  s_aug_seed:
    value: 123
  s_aug_require_freq_blur:
    value: 1
  s_input_is_normalized:
    value: -1

  s_js_weight:
    value: 1.0
  s_js_mode:
    value: "pooled"
  s_js_view_pool:
    value: "matching"

  s_cc_weight:
    value: 0.01
  s_cc_mode:
    value: "pairwise"
  s_cc_view_pool:
    value: "matching"
  s_cc_offdiag:
    value: 0.005
  s_cc_impl:
    value: "fast"
  s_feat_normalize:
    value: 0

  s_cm_weight:
    value: 0.0
  s_sup_type:
    value: "none"
  s_sup_weight:
    value: 0.0
  s_sup_pl_weighted:
    value: 0
  s_sup_conf_scale:
    value: 1
  s_tta_loss:
    value: "none"
  s_tta_weight:
    value: 0.0
  s_tta_target:
    value: "views"
  s_tta_view_pool:
    value: "matching"
  s_sup_view_pool:
    value: "mean"
  s_view_weighting:
    value: 1

  s_alpha_mode:
    values: ["step", "sigmoid"]
  s_alpha_signal:
    values: ["prob_disagreement", "feat_disagreement"]
  s_alpha_threshold:
    values: [0.05, 0.1, 0.2]
  s_alpha_attack_on_high_signal:
    value: 1
  s_alpha_attack_value:
    values: [0.0, 0.15, 0.25]
  s_alpha_clean_value:
    values: [0.5, 0.65]
  s_alpha_transition_width:
    value: 0.1
  s_alpha_sigmoid_slope:
    values: [5.0, 10.0]
