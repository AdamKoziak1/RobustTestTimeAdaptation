# Sweep-ID cache used by scripts/wandb_paper_tables.py
# Fill each alias with a W&B sweep id (abcd1234) or full sweep path (entity/project/abcd1234).
# Aliases can point to the same sweep when the run is selected by row-specific filters.
entity: your_wandb_entity
project: your_wandb_project

datasets:
  - PACS
  - VLCS
  - office-home

attack_rates: [0, 50, 100]
domain_ids: [0, 1, 2, 3]

# Current aliases mirror scripts/wandb_paper_tables.py.
# Leave blank until your sweeps are available.
sweeps:
  erm_baseline: ""
  robust_erm_source: ""
  tent_baseline: ""
  pl_baseline: ""
  eata_baseline: ""
  tsd_baseline: ""
  tesla_baseline: ""
  medbn_tent: ""
  tent_safer: ""
  pl_safer: ""
  eata_safer: ""
  tsd_safer: ""
  tesla_safer: ""
  tent_safer_sig: ""
  pl_safer_sig: ""
  eata_safer_sig: ""
  tsd_safer_sig: ""
  tesla_safer_sig: ""

# Legacy/optional aliases kept for compatibility.
  safer: ""
  safer_sig: ""
