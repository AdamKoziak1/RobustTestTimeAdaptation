program: unsupervise_adapt.py
project: safer
name: comparison_safer_resnet50_pacs_dom0
method: grid
metric:
  name: acc_mean
  goal: maximize

# E9 (stretch): larger-scale sanity-check point - does the Tent vs Tent+SAFER
# gap on PACS:Art survive a switch from ResNet-18 (used everywhere else in the
# paper) to ResNet-50? A focused 2-method x 3-rate comparison (clean / partial
# / fully attacked) rather than the full rho-sweep in
# ablation_attackrate_curve_tent_pacs_dom0.yaml - enough to confirm the effect
# isn't an artifact of the small backbone, without re-running the whole curve.
#
# Depends on scripts/run_e9_resnet50_scale_pipeline.sh stages `train` and
# `attack` having been run first for seeds 0,1,2 (matching every other
# experiment in the paper). That script's header comment explains how the
# ResNet-50 checkpoints/tensors are namespaced by backbone so they can use
# the same seeds as the ResNet-18 runs without colliding with them.
parameters:
  adapt_alg:
    value: "Tent"
  net:
    value: "resnet50"
  dataset:
    value: "PACS"
  test_envs:
    value: 0
  attack:
    value: linf_eps-8.0_steps-20
  attack_rate:
    values: [0, 50, 100]
  steps:
    value: 1
  seeds:
    value: "0,1,2"
  batch_size:
    value: 64

  s_wrap_alg:
    values: [0, 1]
  s_tta_loss:
    value: "none"
  s_tta_weight:
    value: 0.0
  s_num_views:
    value: 4
  s_aug_prob:
    value: 1.0
  s_aug_max_ops:
    value: 3
  s_aug_seed:
    value: 123
  s_noise_std:
    value: -1.0
  s_aug_require_freq_blur:
    value: 1
  s_input_is_normalized:
    value: -1
  s_view_weighting:
    value: 1
  s_primary_view_pool:
    value: "cc_drop"
  s_alpha_mode:
    value: "none"
