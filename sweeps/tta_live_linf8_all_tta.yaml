program: unsupervise_adapt.py
project: safer_final
name: live_linf8_all_tta_baseline
method: grid
metric:
  name: acc_mean
  goal: maximize

parameters:
  adapt_alg:
    values: ["ERM", "Tent", "PL", "TSD", "TeSLA", "SAFER"]
  dataset:
    values: ["PACS", "VLCS", "office-home"]
  test_envs:
    values: [0, 1, 2, 3]
  attack_source:
    value: live
  attack_preset:
    value: linf8
  attack_rate:
    values: [0, 50, 100]
  seeds:
    value: "0,1,2"
  update_param:
    value: "tent"
  batch_size:
    value: 64
