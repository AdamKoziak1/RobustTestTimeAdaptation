program: unsupervise_adapt.py
project: safer
name: tsd_fft
method: grid
metric:
  name: acc_mean
  goal: maximize

parameters:
  adapt_alg:
    value: "TSD"
  dataset:
    values: ["PACS", "VLCS", "office-home"]
  test_envs:
    values: [0, 1, 2, 3]
  attack:
    value: linf_eps-8.0_steps-20
  attack_rate:
    values: [0, 50, 100]
  fft_input_alpha:
    value: 1.0
  fft_input_keep_ratio:
    value: 0.5
  fft_feat_alpha:
    value: 1.0
  fft_feat_keep_ratio:
    value: 1.0
  seeds:
    value: "0,1,2"

  batch_size:
    value: 64
