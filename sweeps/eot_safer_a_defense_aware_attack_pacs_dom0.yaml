program: unsupervise_adapt.py
project: safer
name: eot_safer_a_defense_aware_attack_pacs_dom0
method: grid
metric:
  name: acc_mean
  goal: maximize

# E10 variant: EOT attack on Tent+SAFER-A (clean-retention mode).
# Same setup as eot_safer_defense_aware_attack_pacs_dom0.yaml but with
# s_alpha_mode=sigmoid to show the tradeoff between clean robustness
# (via selective clean retention under uncertainty) and EOT-averaged attack.
# Uses canonical SAFER-A hyperparameters: τ=0.2, κ=3.0, α_atk=0.25, α_clean=0.65.
#
# Pair with eot_safer_defense_aware_attack_baseline_tent_pacs_dom0.yaml for
# the bare-Tent reference point (s_wrap_alg=0, K=1 only).
parameters:
  adapt_alg:
    value: "Tent"
  dataset:
    value: "PACS"
  test_envs:
    value: 0
  steps:
    value: 1
  seeds:
    value: "0,1,2"
  batch_size:
    value: 64

  attack_source:
    value: "live"
  attack_preset:
    value: "linf8"
  attack_steps:
    value: 10
  attack_rate:
    value: 100
  s_attack_use_views:
    value: 1
  attack_eot_views:
    values: [1, 4, 8]

  s_wrap_alg:
    value: 1
  s_tta_loss:
    value: "none"
  s_tta_weight:
    value: 0.0
  s_num_views:
    value: 4
  s_aug_prob:
    value: 1.0
  s_aug_max_ops:
    value: 3
  s_aug_seed:
    value: 123
  s_noise_std:
    value: -1.0
  s_aug_require_freq_blur:
    value: 1
  s_input_is_normalized:
    value: -1
  s_view_weighting:
    value: 1
  s_primary_view_pool:
    value: "cc_drop"

  s_alpha_mode:
    value: "sigmoid"
  s_alpha_signal:
    value: "feat_disagreement"
  s_alpha_attack_high_conf:
    value: 1
  s_alpha_transition_width:
    value: 0.1
  s_alpha_attack_value:
    value: 0.25
  s_alpha_clean_value:
    value: 0.65
  s_alpha_conf_threshold:
    value: 0.2
  s_alpha_sigmoid_slope:
    value: 3.0
