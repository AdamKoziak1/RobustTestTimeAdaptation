program: unsupervised_adapt_dataset.py
project: your_wandb_project
name: safer_alpha_dataset
method: grid
metric:
  name: acc_0
  goal: maximize

parameters:
  attack:
    value: linf_eps-8.0_steps-20
  attack_rate:
    value: 100

  adapt_alg:
    value: "SAFER"





  steps:
    value: 1

  # Keep the rest of SAFER fixed so the adaptive-alpha knobs are isolated.
  s_wrap_alg:
    value: 0
  s_aug_prob:
    value: 1.0
  s_aug_seed:
    value: 123
  s_aug_require_freq_blur:
    value: 1
  s_input_is_normalized:
    value: -1

  s_js_weight:
    value: 1.0
  s_js_mode:
    value: "pooled"
  s_js_view_pool:
    value: "matching"


  s_cc_mode:
    value: "pairwise"
  s_cc_view_pool:
    value: "matching"

  s_cc_impl:
    value: "fast"
  s_feat_normalize:
    value: 0

  s_cm_weight:
    value: 0.0
  s_pl_conf_scale:
    value: 1
  s_tta_loss:
    value: "none"
  s_tta_weight:
    value: 0.0
  s_tta_target:
    value: "views"
  s_tta_view_pool:
    value: "matching"
  s_primary_view_pool:
    value: "mean"
  s_view_weighting:
    value: 1

  # SAFER adaptive-alpha sweep
  s_alpha_mode:
    value: "fixed_conf_threshold"
  s_alpha_conf_threshold:
    values: [0.8, 0.9, 0.99, 0.999]
  s_alpha_attack_value:
    values: [0.0, 0.25, 0.5, 0.75]
  s_alpha_clean_value:
    values: [0.25, 0.5, 0.75, 1.0]
  s_alpha_attack_high_conf:
    value: 1
