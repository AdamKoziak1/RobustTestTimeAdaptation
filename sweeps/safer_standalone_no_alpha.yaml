program: unsupervise_adapt.py
project: your_wandb_project
name: safer_standalone_no_alpha
method: grid
metric:
  name: acc_mean
  goal: maximize

parameters:
  attack:
    value: linf_eps-8.0_steps-20

  adapt_alg:
    value: "SAFER"

  dataset:
    values: ["PACS", "VLCS", "office-home"]

  test_envs:
    values: [0, 1, 2, 3]

  attack_rate:
    values: [0, 50, 100]

  steps:
    value: 1

  s_wrap_alg:
    value: 0

  s_alpha_mode:
    value: "none"
