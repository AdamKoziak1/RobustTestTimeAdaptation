program: unsupervise_adapt.py
project: safer
name: ablation_alpha_tau_kappa_grid_tent_pacs_dom0
method: grid
metric:
  name: acc_mean
  goal: maximize

# E7: (tau, kappa) heatmap of accuracy on PACS:Art, consolidating the four
# existing 1-D SAFER-A sensitivity panels (sweep 161jsdp8 /
# alpha_{tau,kappa,attackval,cleanval}_sensitivity_dom0_*) into one 2-D grid
# over s_alpha_conf_threshold (tau) x s_alpha_sigmoid_slope (kappa), holding
# s_alpha_attack_value / s_alpha_clean_value at the canonical SAFER-A
# operating point used throughout the paper. Covers attack_rate in {0,100}
# so the plot can show clean vs. attacked side by side.
# Grid: 7 tau x 7 kappa x 2 rates = 98 runs (each internally over 3 seeds),
# same value sets as ablation_alpha_params_wide_random_tent_pacs_dom0.yaml
# for direct comparability with the existing 1-D panels.
parameters:
  adapt_alg:
    value: "Tent"
  dataset:
    value: "PACS"
  test_envs:
    value: 0
  attack:
    value: linf_eps-8.0_steps-20
  attack_rate:
    values: [0, 100]
  steps:
    value: 1
  seeds:
    value: "0,1,2"
  batch_size:
    value: 64

  s_wrap_alg:
    value: 1
  s_tta_loss:
    value: "none"
  s_tta_weight:
    value: 0.0
  s_num_views:
    value: 4
  s_aug_prob:
    value: 1.0
  s_aug_max_ops:
    value: 3
  s_aug_seed:
    value: 123
  s_noise_std:
    value: -1.0
  s_aug_require_freq_blur:
    value: 1
  s_input_is_normalized:
    value: -1
  s_view_weighting:
    value: 1
  s_primary_view_pool:
    value: "cc_drop"

  s_alpha_mode:
    value: "sigmoid"
  s_alpha_signal:
    value: "feat_disagreement"
  s_alpha_attack_high_conf:
    value: 1
  s_alpha_transition_width:
    value: 0.1
  s_alpha_attack_value:
    value: 0.25
  s_alpha_clean_value:
    value: 0.65
  s_alpha_conf_threshold:
    values: [0.02, 0.05, 0.10, 0.20, 0.30, 0.40, 0.50]
  s_alpha_sigmoid_slope:
    values: [0.5, 1.0, 2.0, 3.0, 5.0, 8.0, 12.0]
