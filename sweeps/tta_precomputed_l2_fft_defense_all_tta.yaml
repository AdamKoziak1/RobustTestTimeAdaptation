program: unsupervise_adapt.py
project: safer_final
name: bb_l2_fft_defense_all_tta
method: grid
metric:
  name: acc_mean
  goal: maximize

parameters:
  adapt_alg:
    values: ["ERM", "Tent", "PL", "TSD", "TeSLA", "SAFER"]
  dataset:
    values: ["PACS", "VLCS", "office-home"]
  test_envs:
    values: [0, 1, 2, 3]
  attack_source:
    value: precomputed
  attack:
    value: l2_eps-112.0_steps-100
  attack_rate:
    values: [0, 50, 100]
  fft_input_alpha:
    value: 1.0
  fft_input_keep_ratio:
    value: 0.5
  fft_feat_alpha:
    value: 1.0
  fft_feat_keep_ratio:
    value: 0.5
  seeds:
    value: "0,1,2"
  update_param:
    value: "tent"
  batch_size:
    value: 64
