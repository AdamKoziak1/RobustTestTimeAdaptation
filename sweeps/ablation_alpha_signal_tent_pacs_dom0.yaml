program: unsupervise_adapt.py
project: your_wandb_project
name: ablation_alpha_signal_tent_pacs_dom0
method: grid
metric:
  name: acc_mean
  goal: maximize

parameters:
  adapt_alg:
    value: "Tent"
  dataset:
    value: "PACS"
  test_envs:
    value: 0
  attack:
    value: linf_eps-8.0_steps-20
  attack_rate:
    values: [0, 50, 100]
  steps:
    value: 1
  seeds:
    value: "0,1,2"
  batch_size:
    value: 64

  s_wrap_alg:
    value: 1
  s_tta_loss:
    value: "none"
  s_tta_weight:
    value: 0.0
  s_num_views:
    value: 4
  s_aug_prob:
    value: 1.0
  s_aug_max_ops:
    value: 3
  s_aug_seed:
    value: 123
  s_noise_std:
    value: -1.0
  s_aug_require_freq_blur:
    value: 1
  s_input_is_normalized:
    value: -1
  s_view_weighting:
    value: 1
  s_primary_view_pool:
    value: "cc_drop"

  s_alpha_mode:
    value: "sigmoid"
  s_alpha_signal:
    values:
      - "feat_disagreement"
      - "prob_disagreement"
      - "entropy_gap"
      - "margin_gap"
      - "orig_entropy"
      - "orig_conf"
  s_alpha_conf_threshold:
    values: [0.05, 0.10, 0.20, 0.35, 0.50]
  s_alpha_attack_high_conf:
    values: [0, 1]
  s_alpha_attack_value:
    value: 0.25
  s_alpha_clean_value:
    value: 0.65
  s_alpha_sigmoid_slope:
    value: 3.0
