program: unsupervised_adapt_dataset.py
project: safer
name: safer_alpha_step_cleanfirst
method: grid
metric:
  name: acc_0
  goal: maximize

parameters:
  attack:
    value: linf_eps-8.0_steps-20

  adapt_alg:
    value: "SAFER"

  update_param:
    value: "tent"

  lr:
    value: 0.0001

  steps:
    value: 1

  s_wrap_alg:
    value: 0
  s_num_views:
    value: 4
  s_aug_prob:
    value: 1.0
  s_aug_max_ops:
    value: 3
  s_aug_seed:
    value: 123
  s_noise_std:
    value: -1.0
  s_aug_require_freq_blur:
    value: 1
  s_input_is_normalized:
    value: -1

  s_js_weight:
    value: 1.0
  s_js_mode:
    value: "pooled"
  s_js_view_pool:
    value: "matching"

  s_cc_weight:
    value: 0.001
  s_cc_mode:
    value: "pairwise"
  s_cc_view_pool:
    value: "matching"
  s_cc_offdiag:
    value: 0.005
  s_cc_impl:
    value: "fast"
  s_feat_normalize:
    value: 0

  s_cm_weight:
    value: 0.0
  s_tta_loss:
    value: "tent"
  s_tta_weight:
    value: 1.0
  s_tta_target:
    value: "pooled"
  s_tta_view_pool:
    value: "matching"
  s_primary_view_pool:
    value: "mean"
  s_pl_conf_scale:
    value: 1
  s_view_weighting:
    value: 1

  s_alpha_mode:
    value: "step"
  s_alpha_signal:
    value: "orig_conf"
  s_alpha_conf_threshold:
    values: [0.90, 0.95, 0.99]
  s_alpha_attack_value:
    values: [0.50, 0.65, 0.75]
  s_alpha_clean_value:
    values: [0.25, 0.35, 0.50]
  s_alpha_attack_high_conf:
    value: 0
