  s_primary_view_pool:
    value: "cc_drop"
  s_view_weighting:
    value: 1
  s_num_views:
    value: 4
  s_aug_prob:
    value: 1.0
  s_aug_max_ops:
    values: [2, 3, 4, 5]
  s_aug_seed:
    value: 123
  s_noise_std:
    value: -1.0
  s_aug_require_freq_blur:
    value: 1
  s_input_is_normalized:
    value: -1
