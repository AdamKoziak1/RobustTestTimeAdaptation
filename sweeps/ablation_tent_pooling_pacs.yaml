program: unsupervise_adapt.py
project: your_wandb_project
name: ablation_tent_pooling_pacs
method: grid
metric:
  name: acc_mean
  goal: maximize

parameters:
  adapt_alg:
    value: "Tent"
  dataset:
    value: "PACS"
  test_envs:
    values: [0, 1, 2, 3]
  attack:
    value: linf_eps-8.0_steps-20
  attack_rate:
    values: [0, 50, 100]
  steps:
    value: 1
  seeds:
    value: "0,1,2"
  batch_size:
    value: 64

  s_wrap_alg:
    value: 1
  s_alpha_mode:
    value: "none"
  s_tta_loss:
    value: "none"
  s_tta_weight:
    value: 0.0

  s_num_views:
    value: 4
  s_aug_prob:
    value: 1.0
  s_aug_max_ops:
    value: 3
  s_aug_seed:
    value: 123
  s_noise_std:
    value: -1.0
  s_aug_require_freq_blur:
    value: 1
  s_input_is_normalized:
    value: -1
  s_view_weighting:
    value: 1
  s_primary_view_pool:
    values: ["mean", "entropy", "cc", "cc_drop"]
