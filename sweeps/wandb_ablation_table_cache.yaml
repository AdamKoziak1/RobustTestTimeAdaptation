# Sweep-ID cache used by scripts/wandb_ablation_tables.py
# Fill each alias with a W&B sweep id (abcd1234) or full sweep path (entity/project/abcd1234).
entity: your_wandb_entity
project: your_wandb_project

dataset: PACS
attack_rates: [0, 50, 100]
domain_ids: [0, 1, 2, 3]

sweeps:
  tent_baseline: ""
  tent_pooling: ""
  tent_jpeg: ""
  tent_fft: ""
  tent_blur: ""

# Optional extra sweep IDs for plots/extended ablations.
# Keep blank if unused.
extra_sweeps:
  alpha_signal_tent_pacs_dom0: ""
  alpha_mode_tent_pacs_dom0: ""
  alpha_params_wide_tent_pacs_dom0: ""
  views_1to4_tent_pacs_dom0: ""
  maxops_2to5_tent_pacs_dom0: ""
  attackrate_curve_tent_pacs_dom0: ""
